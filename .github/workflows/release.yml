name: Release

on:
  workflow_dispatch:
  schedule:
    - cron: '0 18 * * 3'
      timezone: Europe/Berlin

permissions:
  contents: write
  issues: write
  pull-requests: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  release:
    name: Semantic release
    runs-on: windows-latest
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev'
    environment: release

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Setup Node.js
        uses: actions/setup-node@v7
        with:
          node-version: 24

      - name: Install release dependencies
        run: npm ci

      - name: Restore
        run: dotnet restore Transiever.OutlookResiever.slnx

      - name: Build
        run: dotnet build Transiever.OutlookResiever.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Transiever.OutlookResiever.slnx --configuration Release --no-build

      - name: Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npx semantic-release
