name: CI

on:
  pull_request:
    branches: [main, dev]
  push:
    branches: [main, dev]

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  build-test:
    name: Build and test
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup .NET
        uses: actions/setup-dotnet@v6
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore Transiever.OutlookResiever.slnx

      - name: Build
        run: dotnet build Transiever.OutlookResiever.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Transiever.OutlookResiever.slnx --configuration Release --no-build
